components:
  schemas:
    DailyIntakeOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - //schemas/DailyIntakeOutputBody.json
          format: uri
          readOnly: true
          type: string
        macros:
          $ref: "#/components/schemas/MacroData"
          description: Aggregated nutritional macro information
        meals:
          description: List of meals logged today
          items:
            $ref: "#/components/schemas/Meal"
          type:
            - array
            - "null"
      required:
        - macros
        - meals
      type: object
    DeleteLogOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - //schemas/DeleteLogOutputBody.json
          format: uri
          readOnly: true
          type: string
      type: object
    ErrorDetail:
      additionalProperties: false
      properties:
        location:
          description: Where the error occurred, e.g. 'body.items[3].tags' or 'path.thing-id'
          type: string
        message:
          description: Error message text
          type: string
        value:
          description: The value at the given location
      type: object
    ErrorModel:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - //schemas/ErrorModel.json
          format: uri
          readOnly: true
          type: string
        detail:
          description: A human-readable explanation specific to this occurrence of the problem.
          examples:
            - Property foo is required but is missing.
          type: string
        errors:
          description: Optional list of individual error details
          items:
            $ref: "#/components/schemas/ErrorDetail"
          type:
            - array
            - "null"
        instance:
          description: A URI reference that identifies the specific occurrence of the problem.
          examples:
            - https://example.com/error-log/abc123
          format: uri
          type: string
        status:
          description: HTTP status code
          examples:
            - 400
          format: int64
          type: integer
        title:
          description: A short, human-readable summary of the problem type. This value should not change between occurrences of the error.
          examples:
            - Bad Request
          type: string
        type:
          default: about:blank
          description: A URI reference to human-readable documentation for the error.
          examples:
            - https://example.com/errors/example
          format: uri
          type: string
      type: object
    IngredientBody:
      additionalProperties: false
      properties:
        macros:
          $ref: "#/components/schemas/MacroData"
          description: Nutritional macro information for this ingredient
        name:
          description: Ingredient name
          examples:
            - Grilled Chicken Breast
          type: string
        serving_quantity:
          description: Quantity of the serving
          examples:
            - 1.5
          format: double
          type: number
        serving_size:
          description: Raw serving size generic value
          examples:
            - 150
          format: int64
          type: integer
        serving_unit:
          description: Unit of the serving size (e.g., g, ml)
          examples:
            - g
          type: string
      required:
        - name
        - macros
      type: object
    LogFoodInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - //schemas/LogFoodInputBody.json
          format: uri
          readOnly: true
          type: string
        confidence:
          description: Detection confidence score
          examples:
            - 0.92
          format: double
          type: number
        food_name:
          description: Detected food name
          examples:
            - Grilled Chicken Salad
          type: string
        ingredients:
          description: Breakdown of individual ingredients with their macros
          items:
            $ref: "#/components/schemas/IngredientBody"
          type:
            - array
            - "null"
        macros:
          $ref: "#/components/schemas/MacroData"
          description: Nutritional macro information
        user_id:
          description: Optional UUID of the user logging the meal (defaults to auth context if implemented)
          type: string
      required:
        - food_name
        - confidence
        - macros
        - ingredients
      type: object
    LogFoodOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - //schemas/LogFoodOutputBody.json
          format: uri
          readOnly: true
          type: string
        id:
          description: Database ID of the created food log
          examples:
            - "1"
          type: string
        success:
          description: Indicates whether the log was successfully saved
          examples:
            - true
          type: boolean
      required:
        - success
      type: object
    MacroData:
      additionalProperties: false
      properties:
        calories:
          description: Total calories
          examples:
            - 450
          format: int64
          type: integer
        carbs:
          description: Carbohydrates in grams
          examples:
            - 45
          format: double
          type: number
        fat:
          description: Fat in grams
          examples:
            - 15.5
          format: double
          type: number
        fiber:
          description: Fiber in grams
          examples:
            - 5
          format: double
          type: number
        protein:
          description: Protein in grams
          examples:
            - 25.5
          format: double
          type: number
      required:
        - calories
        - protein
        - carbs
        - fat
        - fiber
      type: object
    Meal:
      additionalProperties: false
      properties:
        calories:
          description: Total calories in the meal
          examples:
            - 450
          format: int64
          type: integer
        emoji:
          description: Visual representation emoji
          examples:
            - 🥗
          type: string
        id:
          description: Database ID of the meal
          examples:
            - "1"
          type: string
        ingredients:
          description: List of ingredients attached to this meal
          items:
            $ref: "#/components/schemas/IngredientBody"
          type:
            - array
            - "null"
        macros:
          $ref: "#/components/schemas/MacroData"
          description: Nutritional macro information for the meal
        name:
          description: Food name
          examples:
            - Grilled Chicken Salad
          type: string
        tag:
          description: Optional descriptive tag
          examples:
            - High Protein
          type: string
        time:
          description: Formatted local time of log
          examples:
            - 08:15 AM
          type: string
      required:
        - id
        - name
        - time
        - calories
        - macros
        - ingredients
        - emoji
      type: object
    ScanInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - //schemas/ScanInputBody.json
          format: uri
          readOnly: true
          type: string
        description:
          description: Optional meal description for better AI analysis
          type: string
        image_base64:
          description: Base64 encoded image data
          type: string
      required:
        - image_base64
      type: object
    ScanOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - //schemas/ScanOutputBody.json
          format: uri
          readOnly: true
          type: string
        confidence:
          description: Detection confidence score
          examples:
            - 0.92
          format: double
          type: number
        food_name:
          description: Detected food name
          examples:
            - Grilled Chicken Salad
          type: string
        ingredients:
          description: Breakdown of individual ingredients with their macros
          items:
            $ref: "#/components/schemas/IngredientBody"
          type:
            - array
            - "null"
        macros:
          $ref: "#/components/schemas/MacroData"
          description: Nutritional macro information
        serving_size:
          description: Estimated serving size
          examples:
            - 1 plate (350g)
          type: string
      required:
        - food_name
        - confidence
        - macros
        - serving_size
        - ingredients
      type: object
info:
  title: VitalStack API
  version: 1.0.0
openapi: 3.1.0
paths:
  /api/nutrition/daily:
    get:
      description: Fetch the user's aggregated daily macros and logged meals for today.
      operationId: get-daily-intake
      parameters:
        - description: Timezone offset in minutes (UTC - Local Time)
          explode: false
          in: query
          name: tz_offset
          schema:
            default: 0
            description: Timezone offset in minutes (UTC - Local Time)
            format: int64
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyIntakeOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Get daily intake
      tags:
        - nutrition
  /api/nutrition/log:
    post:
      description: Log a previously scanned food item to the database
      operationId: log-food
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogFoodInputBody"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogFoodOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Log scanned food
      tags:
        - nutrition
  /api/nutrition/log/{id}:
    delete:
      description: Permanently removes a meal and its scanned ingredients from the user's diary.
      operationId: delete-log
      parameters:
        - description: ID of the logged meal to delete
          in: path
          name: id
          required: true
          schema:
            description: ID of the logged meal to delete
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteLogOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Delete meal log
      tags:
        - nutrition
  /api/nutrition/scan:
    post:
      description: Upload a base64-encoded food image and optionally provide a description. Returns detected food name and macro breakdown.
      operationId: scan-food
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScanInputBody"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Scan food image for nutritional information
      tags:
        - nutrition
servers:
  - url: /
