name: "🚀 Feature Request"
description: "Request a new feature for VitalStack"
labels: ["enhancement", "agent-ready"]
body:
  - type: textarea
    id: description
    attributes:
      label: "Feature Description"
      description: "Describe the feature you want to implement. Provide as much context, user-facing behavior, and ideas as needed. Our research agent will map this loosely written request to the actual codebase."
      placeholder: "I want to implement a feature that..."
    validations:
      required: true
